[options.extras_require]
dev =
    flake8
    rstcheck
    pytest
    pytest-randomly
audio =
    PyAudio >= 0.2.11
pocketsphinx =
    pocketsphinx < 5
whisper-local =
    openai-whisper
    soundfile
whisper-api =
    openai
assemblyai =
    requests

[metadata]
name = SpeechRecognition
version = 3.11.0
author = Anthony Zhang (Uberi)
author_email = azhang9@gmail.com
license = BSD
description = Library for performing speech recognition, with support for several engines and APIs, online and offline.
keywords =
    speech
    recognition
    voice
    sphinx
    google
    wit
    bing
    api
    houndify
    ibm
    snowboy
url = https://github.com/Uberi/speech_recognition#readme
long_description = file: README.rst
long_description_content_type = text/x-rst
classifiers =
    Development Status :: 5 - Production/Stable
    Intended Audience :: Developers
    Natural Language :: English
    License :: OSI Approved :: BSD License
    Operating System :: Microsoft :: Windows
    Operating System :: POSIX :: Linux
    Operating System :: MacOS :: MacOS X
    Operating System :: Other OS
    Programming Language :: Python
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3.9
    Programming Language :: Python :: 3.10
    Programming Language :: Python :: 3.11
    Programming Language :: Python :: 3.12
    Topic :: Software Development :: Libraries :: Python Modules
    Topic :: Multimedia :: Sound/Audio :: Speech

[options]
packages = find:
install_requires =
    typing-extensions
    standard-aifc; python_version>='3.13'
    audioop-lts; python_version>='3.13'
include_package_data = True
python_requires = >=3.9

[options.packages.find]
exclude = tests.*; test
