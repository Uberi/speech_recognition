name: Unit tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.11"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # For pocketsphinx (already installed: swig)
          sudo apt-get install --no-install-recommends -y libpulse-dev libasound2-dev
          # For PyAudio
          sudo apt-get install --no-install-recommends -y portaudio19-dev
      - name: Install ffmpeg (for Whisper)
        uses: FedericoCarboni/setup-ffmpeg@37062fbf7149fc5578d6c57e08aed62458b375d6 # v3.1
      - name: Install Python dependencies (Ubuntu, <=3.12)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version != '3.13'
        run: |
          python -m pip install .[dev,audio,pocketsphinx,google-cloud,whisper-local,faster-whisper,openai,groq,vosk]
      - name: Install Python dependencies (Ubuntu, 3.13)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: |
          python -m pip install standard-aifc setuptools
          python -m pip install --no-build-isolation .[dev,audio,pocketsphinx,google-cloud,openai,groq,vosk]
      - name: Install Python dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install .[dev,whisper-local,faster-whisper,google-cloud,openai,groq,vosk]
      - name: Set up vosk model
        run: python -m speech_recognition.cli download vosk
      - name: Test with unittest
        run: |
          pytest --doctest-modules -s -v speech_recognition/recognizers/ tests/
